name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

env:
  IMAGE_NAME: xelatex

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup QEMU (multi-arch)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub (only when push, not PR)
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Extract Docker tags 
      # git tag: v24.04.1 -> 24.04-1
      # main push 
      - name: Extract tags
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            MAJOR_MINOR=$(echo $VERSION | cut -d. -f1,2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            DOCKER_TAG="${MAJOR_MINOR}-${PATCH}"

            echo "TAGS=${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:${DOCKER_TAG},${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:latest" >> $GITHUB_ENV
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "TAGS=${{ secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}:edge" >> $GITHUB_ENV
          else
            echo "TAGS=" >> $GITHUB_ENV
          fi

      # Build & Push
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.TAGS }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max